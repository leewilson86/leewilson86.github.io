# GitHub Pages / Jekyll configuration for leewilson.me
#
# This site is a hand-built static page; we are NOT using Jekyll as a
# templating engine. The only reason this file exists is to tell Jekyll
# (which GitHub Pages runs by default) to NOT publish the build sources
# and tooling files alongside the served site.
#
# Without this, files like https://leewilson.me/package.json or
# /Makefile or /src/scripts/build.mjs would be reachable. With the
# `exclude:` list below, GitHub Pages drops them from the published
# `_site/` and returns 404 for those URLs.
#
# What is actually served at leewilson.me:
#   /              -> index.html
#   /styles.css    -> styles.css
#   (CNAME is consumed by Pages itself for the custom domain.)
#
# Jekyll's built-in defaults already exclude dotfiles (e.g. .gitignore,
# .dockerignore, .nvmrc, .idea/), node_modules/, vendor/ and Gemfiles,
# so they do not need to appear here.
#
# If you add a new top-level file that is NOT meant to be served at
# leewilson.me, add it to this list (or, preferably, put it under src/
# so it is excluded by the directory rule below).

exclude:
  - AGENTS.md
  - README.md
  - Dockerfile
  - Makefile
  - package.json
  - src/

# Disable Jekyll's default content processing for our hand-written HTML
# and CSS. Listing them under `keep_files` is not needed because they
# are not generated by Jekyll, but pinning `markdown: false`-equivalent
# behaviour is unnecessary - Jekyll only processes files with YAML
# front matter, and index.html has none.

# Belt-and-braces: do not let Jekyll try to render anything as a
# "page" with a layout. We are not using layouts.
defaults:
  - scope:
      path: ""
    values:
      layout: null

