<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0d12" />
  <title>{{NF_TITLE}} - {{NAME}}</title>
  <meta name="description" content="{{NF_MESSAGE}}" />
  <meta name="robots" content="noindex" />

  <link rel="canonical" href="https://leewilson.me/" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0d12'/><text x='50%25' y='55%25' font-family='ui-sans-serif,system-ui' font-size='16' font-weight='700' fill='%23e6f0ff' text-anchor='middle' dominant-baseline='middle'>LW</text></svg>" />
  <!-- Absolute path because GitHub Pages serves this same file for ANY
       not-found URL (e.g. /a/b/c), so a relative href would break. -->
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>

  <div class="bg" aria-hidden="true">
    <div class="grid"></div>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <main id="main" class="shell notfound">
    <header class="hero">
      <p class="nf-code" aria-hidden="true">{{NF_CODE}}</p>
      <h1>{{NF_TITLE}}</h1>
      <p class="tagline">{{NAME}} · leewilson.me</p>
      <p class="intro">{{NF_MESSAGE}}</p>
      <p class="nf-actions"><a class="btn" href="/">{{NF_CTA}}</a></p>
    </header>

    <footer class="foot">
      <p>{{FOOTER}}</p>
    </footer>
  </main>
</body>
</html>
