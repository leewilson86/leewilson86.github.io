<?xml version="1.0" encoding="UTF-8"?>
<!--
  OpenGraph / Twitter card image for leewilson.me at 1200x630.

  Source of truth for the og-image.png at the repo root. Rendered to PNG
  via `make og-image` (one-off Docker container with rsvg-convert). Do
  not edit the PNG directly; edit this file and re-render.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient (matches the site body). -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#07090d"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>

    <!-- Soft blue glow accents (echo .bg .glow-a and .bg .glow-b). -->
    <radialGradient id="glowA" cx="20%" cy="-10%" r="60%">
      <stop offset="0%"  stop-color="#3b6fb3" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#3b6fb3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="100%" cy="0%" r="55%">
      <stop offset="0%"  stop-color="#5aa3ff" stop-opacity="0.20"/>
      <stop offset="55%" stop-color="#5aa3ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Heading gradient: white into cool blue-gray (matches .hero h1). -->
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8d5ea"/>
    </linearGradient>

    <!-- Subtle grid pattern (matches .bg .grid). -->
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background stack -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Monogram tile (echoes the favicon). -->
  <g transform="translate(96 235)">
    <rect width="160" height="160" rx="32" fill="#0a0d12" stroke="#1f2733" stroke-width="2"/>
    <text x="80" y="113"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial"
          font-size="86" font-weight="800" letter-spacing="-2"
          fill="#e6f0ff" text-anchor="middle">LW</text>
  </g>

  <!-- Name -->
  <text x="296" y="320"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial"
        font-size="96" font-weight="800" letter-spacing="-2"
        fill="url(#title)">Lee Wilson</text>

  <!-- Tagline (mono, soft blue) -->
  <text x="298" y="378"
        font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="28" font-weight="500" letter-spacing="0.6"
        fill="#82c0ff">Technologist. Musician. Curious human.</text>

  <!-- Domain footer line -->
  <text x="298" y="430"
        font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="22" font-weight="400" letter-spacing="0.4"
        fill="#9aa6b8">www.leewilson.me</text>

  <!-- Bottom-right accent dot (echoes .section-head h2::before). -->
  <circle cx="1112" cy="534" r="8" fill="#5aa3ff"/>
  <circle cx="1112" cy="534" r="22" fill="#5aa3ff" fill-opacity="0.18"/>
</svg>



